<body>

<h1>Economic Simulation</h1>
<p class="subtitle">Generic Western Nation &mdash; IS-LM / Phillips Curve / Solow Growth Model</p>

<div class="controls">
  <div class="info">Year: <span id="year">1</span></div>
  <div class="info">Quarter: <span id="quarter">Q1</span></div>

<script>
// ============================================================
//  ECONOMIC SIMULATION ENGINE
//  Based on simplified IS-LM, Phillips Curve, Okun's Law,
//  Solow growth, and Taylor Rule frameworks.
// ============================================================

// --- State ---
let turn = 0;
const history = { gdpGrowth: [], inflation: [], unemployment: [], mortgageRate: [], primeRate: [] };

function defaultState() {
  return {
    // Real economy (billions, national currency)
    realGDP: 2000,
    potentialGDP: 2000,
    nominalGDP: 2000,
    priceLevel: 100,
    population: 50,          // millions
    laborForce: 25,           // millions
    employed: 23.75,          // millions
    capitalStock: 5000,
    businessInventories: 300,
    prevBusinessInventories: 300,

    // Rates (percent)
    inflationRate: 2.0,
    realGDPGrowth: 2.5,
    unemploymentRate: 5.0,
    populationGrowthRate: 0.8,
    naturalUnemployment: 5.0,  // NAIRU

    // Interest rates
    centralBankRate: 3.0,
    mortgageRate: 5.5,
    primeRate: 5.0,

    // Government (billions)
    govRevenues: 400,
    govExpenditures: 410,
    govDebt: 800,

    // Tax revenues (billions)
    incomeTaxRevenue: 250,
    capitalGainsTaxRevenue: 50,
    exciseTaxRevenue: 100,

    // Policy levers (rates in %)
    incomeTaxRate: 25,
    capitalGainsTaxRate: 15,
    exciseTaxRate: 10,
    govSpendingLevel: 410,    // billions target
    centralBankTarget: 3.0,   // policy rate %
  };
}

let S = defaultState();

// --- Policy definitions ---
const policies = [
  { key: 'incomeTaxRate',     label: 'Income Tax Rate',         min: 5,   max: 50,  step: 1,   unit: '%' },
  { key: 'capitalGainsTaxRate', label: 'Capital Gains Tax Rate', min: 0,   max: 40,  step: 1,   unit: '%' },
  { key: 'exciseTaxRate',     label: 'Excise Tax Rate',         min: 0,   max: 25,  step: 1,   unit: '%' },
  { key: 'govSpendingLevel',  label: 'Gov. Spending Target (B)', min: 200, max: 800, step: 10,  unit: 'B' },
  { key: 'centralBankTarget', label: 'Central Bank Rate',       min: 0,   max: 12,  step: 0.25, unit: '%' },
];

// --- Random shocks ---
function shock(magnitude) {
  return (Math.random() - 0.5) * 2 * magnitude;
}

// --- Utility: clamp ---
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Simulation step (one quarter) ---
// All core relationships use polynomial (quadratic/cubic) forms to
// capture non-linear dynamics: diminishing returns, accelerating risk,
// asymmetric responses, and threshold effects.
function simulate() {
  const prev = { ...S };
  turn++;

  // 1. Population growth (quarterly)
  //    Logistic-style: growth slows as population approaches carrying capacity
  //    P' = r * P * (1 - P/K)  discretized per quarter
  const carryingCapacity = 120; // millions
  const basePopRate = S.populationGrowthRate / 100;
  const logisticFactor = 1 - Math.pow(S.population / carryingCapacity, 1.5);
  const qPopGrowth = (basePopRate / 4) * Math.max(0.1, logisticFactor);
  S.population *= (1 + qPopGrowth + shock(0.0005));
  // Labor force participation: polynomial in population density
  //   Participation peaks at mid-range population, slight decline at extremes
  const popRatio = S.population / carryingCapacity;
  const participation = 0.50 + 0.04 * popRatio - 0.08 * popRatio * popRatio;
  S.laborForce = S.population * clamp(participation, 0.42, 0.55);

  // 2. Potential GDP growth (Solow-style with diminishing returns)
  //    Cobb-Douglas: Y = A * K^alpha * L^(1-alpha)
  //    Capital contribution uses diminishing marginal returns (concave)
  const depreciation = 0.02 / 4;
  const investment = S.realGDP * 0.20;
  S.capitalStock = S.capitalStock * (1 - depreciation) + investment / 4;
  const tfpGrowth = 0.005 / 4 + shock(0.001);
  const laborGrowth = qPopGrowth * 0.6;
  //    Diminishing returns to capital: cubic polynomial
  //    capitalContrib = a1*x - a2*x^2 + a3*x^3  where x = I/K
  const ik = (investment / 4) / S.capitalStock;
  const capitalContrib = 0.45 * ik - 1.2 * ik * ik + 1.0 * ik * ik * ik;
  S.potentialGDP *= (1 + laborGrowth + capitalContrib + tfpGrowth);

  // 3. IS curve: output gap with polynomial policy transmission
  //    Fiscal multiplier is non-linear: large stimulus has diminishing effect,
  //    large austerity has accelerating contractionary effect (asymmetric)
  const rawFiscal = (S.govSpendingLevel - prev.govExpenditures) / prev.realGDP;
  const fiscalStance = rawFiscal >= 0
    ? 0.5 * rawFiscal - 2.0 * rawFiscal * rawFiscal           // diminishing returns to stimulus
    : 0.5 * rawFiscal - 3.0 * rawFiscal * rawFiscal;           // accelerating austerity drag

  //    Monetary stance: quadratic — extreme rates have outsized impact
  const rDev = S.centralBankTarget - 3.0; // deviation from neutral
  const monetaryStance = -0.004 * rDev - 0.0008 * rDev * Math.abs(rDev);

  //    Tax drag: polynomial with interaction term between income & excise
  const iTaxDev = (S.incomeTaxRate - 25) / 100;
  const eTaxDev = (S.exciseTaxRate - 10) / 100;
  const taxDrag = -(0.20 * iTaxDev + 0.10 * eTaxDev
                    + 0.80 * iTaxDev * iTaxDev
                    + 0.40 * eTaxDev * eTaxDev
                    + 0.50 * iTaxDev * eTaxDev);  // cross-term interaction

  const outputGapTarget = fiscalStance + monetaryStance + taxDrag + shock(0.003);

  //    Output gap persistence: non-linear AR — deeper recessions are stickier
  const prevOutputGap = (prev.realGDP - prev.potentialGDP) / prev.potentialGDP;
  const persistence = prevOutputGap < 0
    ? 0.75 + 0.05 * Math.abs(prevOutputGap) // recessions more persistent
    : 0.65 - 0.05 * prevOutputGap;           // booms fade faster
  const outputGap = clamp(persistence, 0.5, 0.85) * prevOutputGap
                  + (1 - clamp(persistence, 0.5, 0.85)) * outputGapTarget;

  S.realGDP = S.potentialGDP * (1 + outputGap);
  S.realGDPGrowth = ((S.realGDP / prev.realGDP) - 1) * 400;

  // 4. Phillips Curve: non-linear (convex) — inflation accelerates
  //    at large positive gaps, flattens in slack (liquidity trap zone)
  const inflationInertia = prev.inflationRate * 0.60 + 0.05 * prev.inflationRate * Math.abs(prev.inflationRate) / 10;
  //    Convex demand-pull: pi = a*gap + b*gap^2 + c*gap^3
  const g = outputGap;
  const demandPull = 3.0 * g + 8.0 * g * g * Math.sign(g) + 15.0 * g * g * g;
  const costPush = shock(0.15);
  //    Expectations: polynomial anchoring — deviations from target weaken anchor
  const piDev = Math.abs(prev.inflationRate - 2.0);
  const anchorStrength = Math.max(0.05, 0.20 - 0.02 * piDev - 0.005 * piDev * piDev);
  const expectedInflation = 2.0 * anchorStrength;
  S.inflationRate = Math.max(-3, inflationInertia + demandPull + costPush + expectedInflation);

  // Update price level
  S.priceLevel *= (1 + S.inflationRate / 400);
  S.nominalGDP = S.realGDP * S.priceLevel / 100;

  // 5. Okun's Law: polynomial — large gaps have disproportionate effects
  //    u = NAIRU + a*(-gap) + b*(-gap)^2 * sign(-gap) + c*(-gap)^3
  //    Captures: rapid unemployment spikes in deep recessions,
  //    but slow hiring in recoveries (hysteresis-like asymmetry)
  const negGap = -outputGap;
  const okunBase = 2.0 * negGap;
  const okunNonlinear = 1.5 * negGap * Math.abs(negGap);  // quadratic amplifier
  const okunCubic = 0.8 * negGap * negGap * negGap;        // cubic for extreme gaps
  const okunHysteresis = prev.unemploymentRate > S.naturalUnemployment + 2
    ? 0.3 * (prev.unemploymentRate - S.naturalUnemployment - 2) // sticky high unemployment
    : 0;
  S.unemploymentRate = Math.max(1.5, Math.min(25,
    S.naturalUnemployment + okunBase + okunNonlinear + okunCubic + okunHysteresis + shock(0.15)
  ));
  S.employed = S.laborForce * (1 - S.unemploymentRate / 100);

  // 6. Interest rates
  S.centralBankRate = S.centralBankTarget;
  //    Sovereign risk premium: cubic polynomial in debt-to-GDP
  //    Convex: risk accelerates super-linearly at high debt levels
  //    srp = a*(d - 0.4) + b*(d - 0.4)^2 + c*(d - 0.4)^3
  const debtToGDP = S.govDebt / S.nominalGDP;
  const dDev = debtToGDP - 0.40;
  const sovereignRiskPremium = Math.max(-0.5,
    1.0 * dDev + 2.0 * dDev * Math.abs(dDev) + 3.0 * dDev * dDev * dDev
  );
  //    Credit spread: polynomial in unemployment (convex in distress)
  const uDev = S.unemploymentRate - 5;
  const creditSpread = 2.5
    + 0.10 * uDev + 0.02 * uDev * uDev  // quadratic: accelerating in high unemployment
    + sovereignRiskPremium + shock(0.1);
  S.mortgageRate = Math.max(1.0, S.centralBankRate + creditSpread);
  //    Prime rate: sovereign risk has quadratic pass-through
  const primeSovereign = sovereignRiskPremium + 0.3 * sovereignRiskPremium * Math.abs(sovereignRiskPremium);
  S.primeRate = Math.max(0.5, S.centralBankRate + 2.0 + primeSovereign + shock(0.05));

  // 7. Business inventories: non-linear adjustment speed
  //    Firms adjust faster when inventory gap is large (quadratic correction)
  S.prevBusinessInventories = prev.businessInventories;
  const inventoryTrend = S.realGDP * 0.15;
  const invGap = (inventoryTrend - prev.businessInventories) / prev.businessInventories;
  const adjustSpeed = 0.15 + 0.30 * invGap * invGap; // faster correction for big gaps
  const inventoryAdjust = (inventoryTrend - prev.businessInventories) * clamp(adjustSpeed, 0.05, 0.50);
  S.businessInventories = prev.businessInventories + inventoryAdjust + shock(2);

  // 8. Government revenues: polynomial tax models
  //    Income tax: progressive brackets approximated as quadratic
  //    effective_rate = base_rate - a*(rate-25)^2 (Laffer curve: very high rates reduce base)
  const taxableIncome = S.nominalGDP * 0.55;
  const iRateDev = (S.incomeTaxRate - 25) / 100;
  const effectiveIncomeRate = (S.incomeTaxRate / 100) * (1 - 0.8 * iRateDev * iRateDev);
  S.incomeTaxRevenue = taxableIncome * Math.max(0, effectiveIncomeRate);

  //    Capital gains: polynomial in GDP growth and interest rate
  //    Asset prices follow: a + b*growth + c*growth^2 + d*(5-rate) + e*(5-rate)^2
  const gAnn = S.realGDPGrowth / 400;
  const rSpread = (5 - S.centralBankRate) / 100;
  const assetGrowth = 1.0
    + 1.2 * gAnn + 3.0 * gAnn * gAnn       // quadratic in GDP growth
    + 1.5 * rSpread + 4.0 * rSpread * rSpread // quadratic in rate differential
    - 2.0 * gAnn * rSpread                    // interaction term
    + shock(0.02);
  const capitalGainsBase = S.nominalGDP * 0.08 * Math.max(0, assetGrowth);
  //    Laffer effect on capital gains tax too
  const cgRateDev = (S.capitalGainsTaxRate - 15) / 100;
  const effectiveCGRate = (S.capitalGainsTaxRate / 100) * (1 - 1.2 * cgRateDev * cgRateDev);
  S.capitalGainsTaxRevenue = capitalGainsBase * Math.max(0, effectiveCGRate);

  //    Excise tax: consumption share is polynomial in tax rate
  //    Higher excise taxes shrink the consumption base (demand elasticity)
  const exciseRatio = S.exciseTaxRate / 100;
  const consumptionShare = 0.60 - 0.5 * exciseRatio * exciseRatio; // shrinks quadratically
  const consumption = S.nominalGDP * Math.max(0.35, consumptionShare);
  S.exciseTaxRevenue = consumption * exciseRatio;

  S.govRevenues = S.incomeTaxRevenue + S.capitalGainsTaxRevenue + S.exciseTaxRevenue;

  // 9. Government expenditures
  //    Automatic stabilizers: polynomial — costs accelerate in deep downturns
  //    Welfare/unemployment outlays rise quadratically with excess unemployment
  const uExcess = Math.max(0, S.unemploymentRate - S.naturalUnemployment);
  const autoStabilizer = 3.0 * uExcess + 0.8 * uExcess * uExcess + 0.1 * uExcess * uExcess * uExcess;
  //    Debt service: polynomial — high debt commands higher effective rate
  //    (weighted average of old and new debt costs)
  const effectiveBorrowRate = S.centralBankRate + Math.max(0, sovereignRiskPremium);
  const debtService = S.govDebt * (effectiveBorrowRate / 100) / 4;
  S.govExpenditures = S.govSpendingLevel / 4 + autoStabilizer + debtService;
  // Annualize for display
  S.govExpenditures *= 4;

  // Government debt
  const deficit = (S.govExpenditures - S.govRevenues) / 4;
  S.govDebt += deficit;

  // Record history
  history.gdpGrowth.push(S.realGDPGrowth);
  history.inflation.push(S.inflationRate);
  history.unemployment.push(S.unemploymentRate);
  history.mortgageRate.push(S.mortgageRate);
  history.primeRate.push(S.primeRate);

  // Events
  generateEvents(prev);
}

// --- Events ---
const eventLog = [];
function generateEvents(prev) {
  const yr = Math.floor((turn - 1) / 4) + 1;
  const q = 'Q' + (((turn - 1) % 4) + 1);
  const tag = `Y${yr} ${q}`;
  const events = [];

  if (S.realGDPGrowth < -1) events.push('Economy enters contraction territory.');
  else if (S.realGDPGrowth > 5) events.push('Economy experiencing rapid expansion.');

  if (S.inflationRate > 5) events.push('Elevated inflation pressures building.');
  else if (S.inflationRate < 0) events.push('Deflationary conditions emerging.');

  if (S.unemploymentRate > 8) events.push('Unemployment rises to concerning levels.');
  else if (S.unemploymentRate < 3) events.push('Labor market extremely tight.');

  if (S.govDebt / S.nominalGDP > 0.8) events.push('Government debt-to-GDP ratio exceeds 80%. Sovereign risk premium rising.');
  if (S.govDebt < 0 && prev.govDebt >= 0) events.push('Government has paid off all debt and now holds sovereign wealth!');
  if (S.govDebt / S.nominalGDP > 1.0) events.push('Debt exceeds 100% of GDP. Bond markets under strain.');

  if (Math.abs(S.mortgageRate - prev.mortgageRate) > 0.5)
    events.push(`Mortgage rates shift significantly to ${S.mortgageRate.toFixed(1)}%.`);

  // Random events
  const r = Math.random();
  if (r < 0.04) {
    events.push('Trade disruption impacts exports.');
    S.realGDP *= 0.998;
  } else if (r < 0.07) {
    events.push('Technology sector reports strong productivity gains.');
    S.potentialGDP *= 1.001;
  } else if (r < 0.09) {
    events.push('Consumer confidence index rises sharply.');
    S.realGDP *= 1.002;
  }

  if (events.length === 0) events.push('Steady economic conditions this quarter.');

  events.forEach(e => eventLog.unshift({ tag, text: e }));
  if (eventLog.length > 40) eventLog.length = 40;
}

// --- Rendering ---
function fmt(v, decimals = 1) { return v.toFixed(decimals); }
function fmtB(v) { return v.toFixed(1) + 'B'; }
function fmtPct(v) { return v.toFixed(2) + '%'; }

function changeClass(v, invert = false) {
  if (Math.abs(v) < 0.05) return 'neutral';
  const pos = invert ? v < 0 : v > 0;
  return pos ? 'positive' : 'negative';
}

function renderCards() {
  const surplus = S.govRevenues - S.govExpenditures;
  const invChange = S.businessInventories - S.prevBusinessInventories;

  const indicators = [
    { title: 'Real GDP Growth (ann.)',     value: fmtPct(S.realGDPGrowth),          cls: changeClass(S.realGDPGrowth) },
    { title: 'Inflation Rate',            value: fmtPct(S.inflationRate),           cls: S.inflationRate > 4 || S.inflationRate < 0 ? 'negative' : S.inflationRate > 3 ? 'neutral' : 'positive' },
    { title: 'Unemployment Rate',         value: fmtPct(S.unemploymentRate),        cls: S.unemploymentRate > 7 ? 'negative' : S.unemploymentRate > 5.5 ? 'neutral' : 'positive' },
    { title: 'Population Growth Rate',    value: fmtPct(S.populationGrowthRate),    cls: 'neutral' },
    { title: 'Mortgage Interest Rate',    value: fmtPct(S.mortgageRate),            cls: 'neutral' },
    { title: 'Commercial Bank Prime Rate', value: fmtPct(S.primeRate),              cls: 'neutral' },
    { title: 'Change in Business Inventories', value: (invChange >= 0 ? '+' : '') + fmtB(invChange), cls: changeClass(invChange) },
    { title: 'Real GDP Level',            value: fmtB(S.realGDP),                   cls: 'neutral' },
  ];

  const deficit = S.govExpenditures - S.govRevenues;
  const debtLabel = S.govDebt < 0 ? 'Sovereign Wealth' : 'Government Debt';
  const debtDisplay = S.govDebt < 0 ? fmtB(Math.abs(S.govDebt)) : fmtB(S.govDebt);
  const debtCls = S.govDebt < 0 ? 'positive' : S.govDebt / S.nominalGDP > 0.8 ? 'negative' : 'neutral';
  const ratioLabel = S.govDebt < 0 ? 'Sovereign Wealth-to-GDP' : 'Debt-to-GDP Ratio';
  const ratioValue = Math.abs(S.govDebt / S.nominalGDP * 100);
  const ratioCls = S.govDebt < 0 ? 'positive' : ratioValue > 80 ? 'negative' : 'neutral';

  const govFinance = [
    { title: 'Government Surplus / Deficit', value: (surplus >= 0 ? '+' : '') + fmtB(surplus), cls: changeClass(surplus) },
    { title: 'Current Deficit',              value: deficit > 0 ? fmtB(deficit) : 'None (Surplus)', cls: deficit > 0 ? 'negative' : 'positive' },
    { title: 'Government Revenues',          value: fmtB(S.govRevenues),             cls: 'neutral' },
    { title: 'Government Expenditures',      value: fmtB(S.govExpenditures),         cls: 'neutral' },
    { title: debtLabel,                      value: debtDisplay,                      cls: debtCls },
    { title: ratioLabel,                     value: fmt(ratioValue) + '%',            cls: ratioCls },
  ];

  const taxCards = [
    { title: 'Income Tax Revenue',        value: fmtB(S.incomeTaxRevenue),    cls: 'neutral' },
    { title: 'Capital Gains Tax Revenue', value: fmtB(S.capitalGainsTaxRevenue), cls: 'neutral' },
    { title: 'Excise Tax Revenue',        value: fmtB(S.exciseTaxRevenue),    cls: 'neutral' },
  ];

  renderCardGroup('indicators', indicators);
  renderCardGroup('gov-finance', govFinance);
  renderCardGroup('tax-cards', taxCards);
}

function renderCardGroup(id, items) {
  const el = document.getElementById(id);
  el.innerHTML = items.map(c => `
    <div class="card">
      <div class="card-title">${c.title}</div>
      <div class="card-value ${c.cls}">${c.value}</div>
    </div>
  `).join('');
}

function renderPolicies() {
  const el = document.getElementById('policy-controls');
  el.innerHTML = policies.map(p => `
    <div class="policy-item">
      <label>${p.label}</label>
      <div class="slider-row">
        <input type="range" min="${p.min}" max="${p.max}" step="${p.step}"
               value="${S[p.key]}"
               oninput="updatePolicy('${p.key}', this.value, '${p.unit}', this)">
        <span class="slider-val" id="pv-${p.key}">${fmt(S[p.key], p.step < 1 ? 2 : 0)}${p.unit}</span>
      </div>
    </div>
  `).join('');
}

function updatePolicy(key, val, unit, input) {
  S[key] = parseFloat(val);
  const decimals = parseFloat(input.step) < 1 ? 2 : 0;
  document.getElementById('pv-' + key).textContent = parseFloat(val).toFixed(decimals) + unit;
}

function renderLog() {
  const el = document.getElementById('log-entries');
  el.innerHTML = eventLog.map(e =>
    `<p><span class="turn-label">[${e.tag}]</span> ${e.text}</p>`
  ).join('');
}

function renderTurnInfo() {
  const yr = Math.floor((turn - 1) / 4) + 1;
  const q = ((turn - 1) % 4) + 1;
  document.getElementById('year').textContent = yr;
  document.getElementById('quarter').textContent = 'Q' + q;
}

// --- Chart (minimal canvas sparklines) ---
function renderChart() {
  const canvas = document.getElementById('chart-main');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  canvas.style.height = '200px';
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 200;

  ctx.fillStyle = '#1a2733';
  ctx.fillRect(0, 0, W, H);

  if (history.gdpGrowth.length < 2) {
    ctx.fillStyle = '#4a5a6a';
    ctx.font = '13px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Chart will appear after 2 quarters', W / 2, H / 2);
    return;
  }

  const series = [
    { data: history.gdpGrowth,   color: '#2ecc71', label: 'GDP Growth' },
    { data: history.inflation,   color: '#e74c3c', label: 'Inflation' },
    { data: history.unemployment, color: '#f39c12', label: 'Unemployment' },
  ];

  // Compute global min/max
  let gMin = Infinity, gMax = -Infinity;
  series.forEach(s => s.data.forEach(v => { if (v < gMin) gMin = v; if (v > gMax) gMax = v; }));
  const range = Math.max(gMax - gMin, 1);
  const pad = 25;

  // Grid
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad + (H - 2 * pad) * i / 4;
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W - 10, y); ctx.stroke();
    ctx.fillStyle = '#4a5a6a';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(gMax - (range * i / 4), 1) + '%', pad - 4, y + 3);
  }

  // Zero line
  if (gMin < 0 && gMax > 0) {
    const zeroY = pad + (H - 2 * pad) * (gMax / range);
    ctx.strokeStyle = '#4a5a6a';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad, zeroY); ctx.lineTo(W - 10, zeroY); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Lines
  const n = history.gdpGrowth.length;
  const xStep = (W - pad - 10) / Math.max(n - 1, 1);

  series.forEach(s => {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    s.data.forEach((v, i) => {
      const x = pad + i * xStep;
      const y = pad + (H - 2 * pad) * (1 - (v - gMin) / range);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  // Legend
  let lx = pad + 5;
  ctx.font = '11px system-ui';
  series.forEach(s => {
    ctx.fillStyle = s.color;
    ctx.fillRect(lx, H - 14, 12, 3);
    ctx.fillStyle = '#8a9aaa';
    ctx.textAlign = 'left';
    ctx.fillText(s.label, lx + 16, H - 8);
    lx += ctx.measureText(s.label).width + 32;
  });
}

// --- Advance ---
function advanceTurn() {
  simulate();
  render();
}

function advanceYear() {
  for (let i = 0; i < 4; i++) simulate();
  render();
}

function resetSim() {
  turn = 0;
  S = defaultState();
  history.gdpGrowth.length = 0;
  history.inflation.length = 0;
  history.unemployment.length = 0;
  history.mortgageRate.length = 0;
  history.primeRate.length = 0;
  eventLog.length = 0;
  render();
}

function render() {
  renderTurnInfo();
  renderCards();
  renderPolicies();
  renderChart();
  renderLog();
}

// --- Init ---
window.addEventListener('resize', renderChart);
// Run one initial quarter so there's data
simulate();
render();
</script>
</body>
</html>
